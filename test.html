<div class="container-fluid p-4">

    <h3 class="mb-4">Inbox Task</h3>

    <!-- Filter -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

     <div class="input-group">
    <input type="text" class="form-control"
        placeholder="Search Task / Customer / ID...">
    <span class="input-group-text bg-white">
        <i class="bi bi-search"></i>
    </span>
</div>
               <div class="col-md-2">
    <div class="mb-1 fw-semibold">
        Status
    </div>

    <select class="form-select">
        <option selected>Semua Status</option>
        <option>Open</option>
        <option>On Progress</option>
        <option>Waiting</option>
        <option>Closed</option>
    </select>
</div>

                <div class="col-md-2">
                    <div class="mb-1 fw-semibold">
                        Tipe
                    </div>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>Incident</option>
                        <option>Request</option>
                        <option>Maintenance</option>
                    </select>
                </div>

                <div class="col-md-2">
                  <div class="mb-1 fw-semibold">
                    Prioritas
                  </div>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>

                <div class="col-md-2">
                   <div class="mb-1 fw-semibold">
                    SLA
                    </div>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>Dalam SLA</option>
                        <option>Melewati SLA</option>
                    </select>
                </div>
   <div class="col-lg-1 col-md-6 d-grid">
                    <button class="btn btn-primary">
                        <i class="bi bi-funnel"></i> Filter
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle text-center">
                    
<table class="table" id="taskTable">
    <thead>
        <tr>
            <th>ID Task</th>
            <th>Tipe</th>
            <th>Customer</th>
            <th>Area</th>
            <th>SLA</th>
            <th>Sisa Waktu</th>
            <th>Prioritas</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>TK-001</td>
            <td>Incident</td>
            <td>PT ABC</td>
            <td>Jakarta</td>
            <td>4 Jam</td>
            <td>45 Menit</td>
            <td>High</td>
            <td>Open</td>
            <td>...</td>
        </tr>
    </tbody>
</table>

                </table>

            </div>

        </div>

    </div>

</div>
