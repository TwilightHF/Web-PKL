<div class="container-fluid p-4">

    <h3 class="mb-4">Inbox Task</h3>

    <!-- Filter -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="row g-3 align-items-end">

                <div class="col-md-3">
                    <label class="form-label">Search</label>
                    <input type="text" class="form-control" placeholder="Cari ID Task atau Customer">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>Open</option>
                        <option>On Progress</option>
                        <option>Waiting</option>
                        <option>Closed</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Tipe</label>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>Incident</option>
                        <option>Request</option>
                        <option>Maintenance</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Prioritas</label>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">SLA</label>
                    <select class="form-select">
                        <option>Semua</option>
                        <option>Dalam SLA</option>
                        <option>Melewati SLA</option>
                    </select>
                </div>

                <div class="col-md-1">
                    <button class="btn btn-primary w-100">
                        <i class="bi bi-funnel"></i>
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle text-center">

                    <thead class="table-dark">

                        <tr>
                            <th>ID Task</th>
                            <th>Tipe</th>
                            <th>Customer</th>
                            <th>Area</th>
                            <th>SLA</th>
                            <th>Sisa Waktu</th>
                            <th>Prioritas</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr>
                            <td>TK-001</td>
                            <td>Incident</td>
                            <td>PT ABC</td>
                            <td>Jakarta</td>
                            <td>4 Jam</td>
                            <td><span class="badge bg-danger">45 Menit</span></td>
                            <td><span class="badge bg-danger">High</span></td>
                            <td><span class="badge bg-danger">Open</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>TK-002</td>
                            <td>Request</td>
                            <td>PT XYZ</td>
                            <td>Bandung</td>
                            <td>8 Jam</td>
                            <td>3 Jam</td>
                            <td><span class="badge bg-warning text-dark">Medium</span></td>
                            <td><span class="badge bg-primary">On Progress</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>TK-003</td>
                            <td>Maintenance</td>
                            <td>PT DEF</td>
                            <td>Surabaya</td>
                            <td>12 Jam</td>
                            <td>5 Jam</td>
                            <td><span class="badge bg-success">Low</span></td>
                            <td><span class="badge bg-warning text-dark">Waiting</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
